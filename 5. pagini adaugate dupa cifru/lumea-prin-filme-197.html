<style>
  :root {
    --ink: #173f28;
    --paper: #edf3d4;

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #d9d9d9;
    font-family: Arial, sans-serif;
  }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 12px;
    background: #ffffff;
    border-bottom: 1px solid #ccc;
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .toolbar button {
    border: 1px solid var(--ink);
    background: var(--ink);
    color: white;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
  }

  .toolbar button.secondary {
    background: white;
    color: var(--ink);
  }

  .sheet {
    width: min(96vw, 1200px);
    margin: 20px auto;
    background: white;
    box-shadow: 0 10px 35px rgba(0,0,0,.25);
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
  }

  @page {
    size: 100cm 75cm;
    margin: 0;
  }

  @media print {
    html, body {
      width: 100cm;
      height: 75cm;
      margin: 0;
      padding: 0;
      background: transparent;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .toolbar {
      display: none !important;
    }

    .sheet {
      width: 100cm;
      height: 75cm;
      margin: 0;
      padding: 0;
      box-shadow: none;
      background: transparent;
    }

    svg {
      width: 100cm;
      height: 75cm;
    }
  }

const abbreviations = {
  "Antigua and Barbuda": "Antigua & Barb.",
  "Bosnia and Herzegovina": "Bosnia & Herz.",
  "Central African Republic": "Cent. African Rep.",
  "Democratic Republic of the Congo": "DR Congo",

  "United States": "United States",
  "Vatican City": "Vatican City"
};

const NS = "http://www.w3.org/2000/svg";

function E(tag, attrs = {}, parent = null) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  if (parent) parent.appendChild(el);
  return el;
}

function safeLabel(country) {
  let label = abbreviations[country] || country;
  label = label.toUpperCase();

  // Ultima protecție: nu micșorează textul, ci taie elegant cu punct.
  // Practic nu se activează la lista de mai sus, fiindcă numele lungi sunt deja abreviate.
  if (label.length > 20) label = label.slice(0, 19).trim() + ".";
  return label;
}

function renderCountries() {
  const grid = document.getElementById("countryGrid");
  grid.innerHTML = "";

  const cols = 19;
  const startX = 270;
  const startY = 1120;
  const colStep = 500;
  const rowStep = 500;
  const tileW = 455;

  // Casete pentru mini-postere în format vertical 2:3.
  // Exemplu: 270 × 405 unități SVG = raport exact 2:3.
  const boxW = 270;
  const boxH = 405;

  const totalRows = Math.ceil(countries.length / cols);
  const lastCount = countries.length % cols;
  const lastRow = totalRows - 1;
  const lastOffset = lastCount ? Math.floor((cols - lastCount) / 2) : 0;

  countries.forEach((country, i) => {
    const n = i + 1;
    let row = Math.floor(i / cols);
    let col = i % cols;

    if (row === lastRow && lastCount !== 0) col += lastOffset;

    const x = startX + col * colStep;
    const y = startY + row * rowStep;
    const boxX = x + (tileW - boxW) / 2;
    const boxY = y;
    const cx = x + tileW / 2;

    const g = E("g", {}, grid);

    E("rect", {
      x: boxX,
      y: boxY,
      width: boxW,
      height: boxH,
      class: "movieBox"
    }, g);

    E("text", {
      x: cx,
      y: boxY + boxH + 43,
      "text-anchor": "middle",
      class: "country-label"
    }, g).textContent = `${n}. ${safeLabel(country)}`;
  });
}

renderCountries();

function downloadSVG() {
  const svg = document.getElementById("poster");
  const clone = svg.cloneNode(true);
  clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  clone.setAttribute("width", "100cm");
  clone.setAttribute("height", "75cm");

  const source = `<?xml version="1.0" encoding="UTF-8"?>\n` + new XMLSerializer().serializeToString(clone);
  const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "lumea-prin-filme-100x75cm-casete-2x3.svg";
  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);
}

function downloadPNG300() {
  const svg = document.getElementById("poster");
  const clone = svg.cloneNode(true);
  clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  clone.setAttribute("width", "11811");
  clone.setAttribute("height", "8858");

  const source = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const img = new Image();

  img.onload = function () {
    const canvas = document.createElement("canvas");
    canvas.width = 11811;
    canvas.height = 8858;

    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#edf3d4";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    URL.revokeObjectURL(url);

    canvas.toBlob(function (pngBlob) {
      const pngUrl = URL.createObjectURL(pngBlob);
      const a = document.createElement("a");
      a.href = pngUrl;
      a.download = "lumea-prin-filme-100x75cm-casete-2x3-300dpi.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(pngUrl);
    }, "image/png");
  };

  img.onerror = function () {
    URL.revokeObjectURL(url);
    alert("Exportul PNG nu a reușit. Folosește varianta SVG sau PDF, care este oricum mai bună pentru print.");
  };

  img.src = url;
}
