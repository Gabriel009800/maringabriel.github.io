<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locuri din București – Marin Gabriel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: #ffffff;
      color: #222;
      font-family: 'Poppins', sans-serif;
    }

    .page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 45px 48px 70px;
    }

    h1 {
      font-size: 54px;
      line-height: 1.1;
      font-weight: 500;
      margin: 0 0 42px;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 28px 0 38px;
    }

    .summary-block {
      display: inline-block;
      width: fit-content;
      max-width: 100%;
      margin: 0 0 24px;
    }

    .summary-title {
      font-size: 34px;
      line-height: 1.35;
      font-weight: 400;
      margin: 0 0 34px;
      padding-top: 34px;
      border-top: 1px solid #ddd;
      white-space: nowrap;
    }

    .stats {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 36px;
    }

    .stat {
      height: 128px;
      border: 1px solid #ddd;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 32px;
      line-height: 1;
      font-weight: 500;
      margin: 0 0 8px;
    }

    .stat span {
      display: block;
      font-size: 19px;
      line-height: 1.2;
      font-weight: 400;
    }

    .filter-panel {
      margin: 4px 0 26px;
      padding: 20px;
      border: 1px solid #ddd;
      background: #fafafa;
    }

    .filter-title {
      margin: 0 0 14px;
      font-size: 22px;
      font-weight: 500;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1.1fr 1.1fr 1.1fr auto;
      gap: 14px;
      align-items: end;
    }

    .filter-field { display: flex; flex-direction: column; gap: 7px; }

    .filter-field label {
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }

    .filter-field select,
    .filter-button {
      height: 42px;
      border: 1px solid #bbb;
      background: #fff;
      color: #222;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      padding: 0 12px;
      outline: none;
    }

    .filter-field select:focus { border-color: #555; }

    .filter-button {
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-button:hover { background: #eee; }

    .filter-field.is-hidden { display: none; }

    #map {
      width: 100%;
      height: 590px;
      border: 1px solid #d5d5d5;
      margin: 10px 0 40px;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      font-family: 'Poppins', sans-serif;
    }

    .popup-title {
      display: block;
      margin-bottom: 7px;
      font-size: 15px;
      font-weight: 600;
      color: #222;
    }

    .popup-story {
      max-width: 285px;
      font-size: 13px;
      line-height: 1.55;
      color: #555;
      font-style: normal;
    }

    .popup-status {
      display: block;
      margin-top: 7px;
      color: #9a5a00;
      font-size: 12px;
      font-weight: 500;
      font-style: normal;
    }

    .leaflet-control-layers {
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin: -15px 0 34px;
      color: #555;
      font-size: 14px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(0,0,0,.18);
    }

    .places-title {
      font-size: 28px;
      font-weight: 500;
      margin: 0 0 22px;
    }

    .places {
      columns: 3;
      column-gap: 48px;
      font-size: 17px;
      line-height: 1.85;
      margin-bottom: 42px;
    }

    .domain-group {
      break-inside: avoid;
      margin: 0 0 28px;
    }

    .domain-title {
      font-size: 21px;
      font-weight: 600;
      margin: 0 0 10px;
    }

    .category-group {
      break-inside: avoid;
      margin: 0 0 18px;
    }

    .category-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px;
      color: #555;
    }

    .place-item {
      break-inside: avoid;
      margin-bottom: 4px;
    }

    .place-meta {
      color: #777;
      font-size: 14px;
    }

    .place-status {
      color: #9a5a00;
      font-size: 14px;
      font-weight: 500;
    }

    .empty-state {
      padding: 18px;
      border: 1px dashed #ccc;
      background: #fafafa;
      color: #666;
      font-size: 15px;
    }

    .footer {
      text-align: center;
      color: #666;
      font-size: 14px;
      padding: 26px 0 0;
    }

    @media (max-width: 900px) {
      .page { padding: 34px 22px 55px; }
      h1 { font-size: 40px; }
      .summary-block { display: block; width: 100%; }
      .summary-title { white-space: normal; font-size: 26px; }
      .stats { grid-template-columns: 1fr; gap: 18px; }
      .stat { height: 112px; }
      .filter-grid { grid-template-columns: 1fr; }
      #map { height: 430px; }
      .places { columns: 1; }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>Locuri din București</h1>

    <hr>

    <section class="filter-panel" aria-label="Filtre hartă">
      <h2 class="filter-title">Filtre hartă</h2>

          <label for="filter-domain">Domeniu</label>
          <select id="filter-domain"></select>
        </div>

        <div class="filter-field">
          <label for="filter-category">Subcategorie</label>
          <select id="filter-category"></select>
        </div>

        <div class="filter-field is-hidden" id="restaurant-type-field">
          <label for="filter-restaurant-type">Tip restaurant</label>
          <select id="filter-restaurant-type"></select>
        </div>

        <button class="filter-button" id="reset-filters" type="button">Resetează filtrele</button>
      </div>
    </section>

    <div id="map"></div>
    <div class="legend" id="legend"></div>

    <h2 class="places-title">Lista locurilor afișate</h2>
    <div class="places" id="places"></div>

    <hr>

    <div class="footer">· © 2026 Marin Gabriel ·</div>
  </main>

      select.innerHTML = "";
      options.forEach(option => {
        const el = document.createElement("option");
        el.value = option.value;
        el.textContent = option.label;
        if (option.value === selectedValue) el.selected = true;
        select.appendChild(el);

    function getCategoriesForDomain(domain) {
      const visiblePlaces = domain === "__all__"
        ? locuri
        : locuri.filter(loc => loc.domeniu === domain);

      const existing = new Set(visiblePlaces.map(loc => loc.categorie));
      return categoryOrder.filter(cat => existing.has(cat));
    }

    function renderFilterControls() {
      const domainSelect = document.getElementById("filter-domain");
      const categorySelect = document.getElementById("filter-category");
      const typeSelect = document.getElementById("filter-restaurant-type");
      const typeField = document.getElementById("restaurant-type-field");

      const domainOptions = [
        { value: "__all__", label: "Toate domeniile" },
        ...domainOrder.map(domain => ({ value: domain, label: domain }))
      ];
      fillSelect(domainSelect, domainOptions, filterState.domain);

      const categories = getCategoriesForDomain(filterState.domain);
      if (filterState.category !== "__all__" && !categories.includes(filterState.category)) {
        filterState.category = "__all__";
      }

      const categoryOptions = [
        { value: "__all__", label: "Toate subcategoriile" },
        ...categories.map(cat => ({ value: cat, label: cat }))
      ];
      fillSelect(categorySelect, categoryOptions, filterState.category);

      const showRestaurantType = filterState.category === "Restaurante";
      typeField.classList.toggle("is-hidden", !showRestaurantType);

      if (!showRestaurantType) {
        filterState.restaurantType = "__all__";
      }

      const restaurantTypes = uniqueSorted(locuri
        .filter(loc => loc.domeniu === "Locuri de luat masa" && loc.categorie === "Restaurante")
        .map(loc => loc.tipRestaurant));

      const typeOptions = [
        { value: "__all__", label: "Toate tipurile" },
        ...restaurantTypes.map(type => ({ value: type, label: type }))
      ];
      fillSelect(typeSelect, typeOptions, filterState.restaurantType);
    }

      });
    }

        const marker = L.circleMarker([loc.lat, loc.lng], {
          radius: 5,
          color: color,
          fillColor: color,
          weight: 1.5,
          fillOpacity: 0.88
        }).bindPopup(popupContent(loc));

        marker.addTo(markerGroup);
        markers.push(marker);
      });

      if (markers.length > 0) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.16));
      } else {
        map.setView([44.4268, 26.1025], 12);
      }

        domainGroup.className = "domain-group";

        const domainTitle = document.createElement("h3");
        domainTitle.className = "domain-title";
        domainTitle.textContent = domain;
        domainGroup.appendChild(domainTitle);

        categoryOrder.forEach(category => {
          const categoryItems = domainItems
            .filter(loc => loc.categorie === category)
            .sort((a, b) => romanianCompare(a.nume, b.nume));

          if (!categoryItems.length) return;

          const categoryGroup = document.createElement("section");
          categoryGroup.className = "category-group";

          const categoryTitle = document.createElement("h4");
          categoryTitle.className = "category-title";
          categoryTitle.textContent = category;
          categoryGroup.appendChild(categoryTitle);

          categoryItems.forEach(loc => {
            const div = document.createElement("div");
            div.className = "place-item";
            div.innerHTML = loc.nume + placeExtra(loc) + (loc.status ? ' <span class="place-status">— ' + loc.status + '</span>' : "");
            categoryGroup.appendChild(div);
          });

          domainGroup.appendChild(categoryGroup);
        });

        container.appendChild(domainGroup);
      });

    }

    function updateView() {
      renderFilterControls();
      const places = getFilteredPlaces();
      renderMap(places);
      renderLegend(places);
      renderPlaces(places);
    }

    document.getElementById("filter-domain").addEventListener("change", event => {
      filterState.domain = event.target.value;
      filterState.category = "__all__";
      filterState.restaurantType = "__all__";
      updateView();
    });

    document.getElementById("filter-category").addEventListener("change", event => {
      filterState.category = event.target.value;
      filterState.restaurantType = "__all__";
      updateView();
    });

    document.getElementById("filter-restaurant-type").addEventListener("change", event => {
      filterState.restaurantType = event.target.value;
      updateView();
    });

    document.getElementById("reset-filters").addEventListener("click", () => {
      filterState.domain = "__all__";
      filterState.category = "__all__";
      filterState.restaurantType = "__all__";
      updateView();
    });

    updateView();
  </script>
</body>
</html>
