  const competencies = {

  const resultAreas = [
    {
      title: "cerințele de cronologie și de reprezentare a spațiului istoric",
      match: code => code.startsWith("C1.")
    },
    {
      title: "cerințele de utilizare critică a limbajului de specialitate și a surselor istorice",
      match: code => code.startsWith("C2.")
    },
    {
      title: "cerințele de aplicare a gândirii critice și analitice",
      match: code => code.startsWith("C3.") || code.startsWith("C4.")
    }
  ];

  function percent(value, total) {
    if (total === 0) return "0%";
    return ((value / total) * 100).toFixed(2).replace(".00", "") + "%";
  }

  function levelLabel(score) {
    if (score >= 85) return "nivel foarte bun";
    if (score >= 70) return "nivel bun";
    if (score >= 50) return "nivel mediu";
    if (score >= 30) return "nivel fragil";
    return "necesită consolidare";
  }

  function generalFeedback(score) {
    if (score >= 85) return "Rezultatul indică o stăpânire foarte bună a conținuturilor și a competențelor evaluate. Elevul poate lucra mai departe pe itemi de analiză și comparație, nu doar pe recunoașterea informațiilor.";
    if (score >= 70) return "Rezultatul indică o înțelegere bună a temei Preistoria. Pentru progres, este utilă exersarea itemilor care cer interpretarea surselor și verificarea critică a informațiilor.";
    if (score >= 50) return "Rezultatul indică un nivel mediu. Noțiunile principale sunt parțial înțelese, dar este nevoie de recapitulare, mai ales la competențele unde procentul este mai scăzut.";
    if (score >= 30) return "Rezultatul indică un nivel fragil. Este recomandată reluarea lecției, lucrul cu axa cronologică, termenii de bază și exemple simple de surse istorice.";
    return "Rezultatul indică nevoia de consolidare serioasă. Este recomandată reluarea unității Preistoria pas cu pas, cu accent pe cronologie, termeni istorici și diferențierea dintre informații factuale, opinii și speculații.";
  }

  function renderQuiz() {
    const form = document.getElementById("quizForm");
    form.innerHTML = "";

    questions.forEach(question => {
      const card = document.createElement("article");
      card.className = "question-card";
      card.id = "question-" + question.id;
      card.dataset.questionId = question.id;

      const title = document.createElement("p");
      title.className = "question-title";
      title.textContent = question.id + ". " + question.text;
      card.appendChild(title);

      Object.entries(question.options).forEach(([letter, option]) => {
        const label = document.createElement("label");
        label.className = "option-label";

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "q" + question.id;
        input.value = letter;

        const span = document.createElement("span");
        span.textContent = letter + ". " + option;

        label.appendChild(input);
        label.appendChild(span);
        card.appendChild(label);
      });

      form.appendChild(card);
    });
  }

  function finishQuiz() {
    let correct = 0;
    let wrong = 0;
    let missing = 0;

    const areaStats = resultAreas.map(area => ({
      title: area.title,
      match: area.match,
      total: 0,
      correct: 0
    }));

    questions.forEach(question => {
      const selected = document.querySelector(`input[name="q${question.id}"]:checked`);
      const area = areaStats.find(item => item.match(question.competency));

      if (area) {
        area.total += 1;
      }

      if (!selected) {
        missing += 1;
      } else if (selected.value === question.answer) {
        correct += 1;
        if (area) {
          area.correct += 1;
        }
      } else {
        wrong += 1;
      }
    });

    const total = questions.length;
    const totalPercent = (correct / total) * 100;

    let html = `
      <h2>Interpretarea rezultatului</h2>
      <p class="result-line">Răspunsuri corecte: <strong>${correct} (${percent(correct, total)})</strong>. Răspunsuri greșite: <strong>${wrong} (${percent(wrong, total)})</strong>.</p>
      <p class="result-line">Cerințe la care nu ai răspuns: <strong>${missing} (${percent(missing, total)})</strong>.</p>
      <div class="interpretation">${generalFeedback(totalPercent)}</div>
      <h3>Ai răspuns corect în proporție de:</h3>
      <div class="competency-lines">
    `;

    areaStats.forEach(area => {
      html += `
        <p><strong>${percent(area.correct, area.total)}</strong> la ${area.title}</p>
      `;
    });

    html += `
      </div>
      <div class="interpretation"><strong>Această fișă se poate salva sau imprima pentru urmărirea progresului.</strong> Rezultatul este orientativ și trebuie interpretat împreună cu participarea la ore, exercițiile scrise și evoluția elevului în timp.</div>
      <div class="result-actions">
        <button id="reviewToggleButton" type="button" class="secondary-button" onclick="toggleReview()">Arată răspunsurile pe întrebări</button>
        <p id="reviewHint" class="review-hint">Răspunsurile nu mai apar ca listă separată. Se vor marca direct pe fiecare întrebare: ce ai bifat, dacă este corect sau greșit și care era varianta corectă.</p>
      </div>
    `;

    clearReviewMarks();
    reviewVisible = false;

    const resultBox = document.getElementById("resultBox");
    resultBox.innerHTML = html;
    resultBox.style.display = "block";
    resultBox.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  let reviewVisible = false;

  function clearReviewMarks() {
    document.querySelectorAll(".question-card").forEach(card => {
      card.classList.remove("review-mode", "review-correct-card", "review-wrong-card", "review-missing-card");
      const note = card.querySelector(".question-review-note");
      if (note) note.remove();
    });

    document.querySelectorAll(".option-label").forEach(label => {
      label.classList.remove("review-correct-option", "review-selected-correct", "review-selected-wrong");
      const badge = label.querySelector(".review-badge");
      if (badge) badge.remove();
    });
  }

  function addBadge(label, text, kind) {
    const badge = document.createElement("span");
    badge.className = "review-badge " + kind;
    badge.textContent = text;
    label.appendChild(badge);
  }

  function applyReviewMarks() {
    clearReviewMarks();

    questions.forEach(question => {
      const card = document.getElementById("question-" + question.id);
      if (!card) return;

      const selected = document.querySelector(`input[name="q${question.id}"]:checked`);
      const chosen = selected ? selected.value : null;
      const isCorrect = chosen === question.answer;

      let noteText;
      let noteClass;

      card.classList.add("review-mode");

      if (!chosen) {
        noteText = `Nu ai bifat niciun răspuns. Varianta corectă era ${question.answer}.`;
        noteClass = "missing";
        card.classList.add("review-missing-card");
      } else if (isCorrect) {
        noteText = `Ai bifat ${chosen}. Răspuns corect.`;
        noteClass = "correct";
        card.classList.add("review-correct-card");
      } else {
        noteText = `Ai bifat ${chosen}, dar varianta corectă era ${question.answer}.`;
        noteClass = "wrong";
        card.classList.add("review-wrong-card");
      }

      const note = document.createElement("div");
      note.className = "question-review-note " + noteClass;
      note.textContent = noteText;

      const title = card.querySelector(".question-title");
      if (title) {
        title.insertAdjacentElement("afterend", note);
      } else {
        card.prepend(note);
      }

      card.querySelectorAll(".option-label").forEach(label => {
        const input = label.querySelector("input");
        if (!input) return;

        if (input.value === question.answer && input.value === chosen) {
          label.classList.add("review-selected-correct");
          addBadge(label, "ai bifat — corect", "correct");
        } else if (input.value === chosen && input.value !== question.answer) {
          label.classList.add("review-selected-wrong");
          addBadge(label, "ai bifat — greșit", "wrong");
        } else if (input.value === question.answer) {
          label.classList.add("review-correct-option");
          addBadge(label, "varianta corectă", "correct");
        }
      });
    });
  }

  function toggleReview() {
    const button = document.getElementById("reviewToggleButton");
    const hint = document.getElementById("reviewHint");

    reviewVisible = !reviewVisible;

    if (reviewVisible) {
      applyReviewMarks();
      if (button) button.textContent = "Ascunde marcajele de pe întrebări";
      if (hint) hint.textContent = "Marcajele sunt afișate direct pe întrebări. Derulează prin test ca să vezi ce ai bifat și care era varianta corectă.";
      const firstQuestion = document.getElementById("question-1");
      if (firstQuestion) firstQuestion.scrollIntoView({ behavior: "smooth", block: "start" });
    } else {
      clearReviewMarks();
      if (button) button.textContent = "Arată răspunsurile pe întrebări";
      if (hint) hint.textContent = "Răspunsurile nu mai apar ca listă separată. Se vor marca direct pe fiecare întrebare: ce ai bifat, dacă este corect sau greșit și care era varianta corectă.";
    }
  }

  function resetQuiz() {
    document.querySelectorAll("input[type='radio']").forEach(input => input.checked = false);
    clearReviewMarks();
    reviewVisible = false;
    const resultBox = document.getElementById("resultBox");
    resultBox.style.display = "none";
    resultBox.innerHTML = "";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  document.addEventListener("DOMContentLoaded", renderQuiz);
</script>
