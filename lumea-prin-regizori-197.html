if (directors.length !== 197) console.warn("Lista are " + directors.length + " regizori, nu 197.");

const NS = "http://www.w3.org/2000/svg";
function E(tag, attrs={}, parent=null){
  const el=document.createElementNS(NS,tag);
  for(const[k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  if(parent) parent.appendChild(el);
  return el;
}

/*
  Împarte numele în maximum două rânduri, fără să taie sau să abreviereze numele.
  Astfel păstrează exact forma trimisă, dar o face să încapă în căsuță.
*/
function labelFor(name){
  const parts = name.trim().split(/\s+/);
  if(parts.length <= 2) return parts;

  let bestSplit = 1;
  let bestScore = Infinity;

  for(let i=1;i<parts.length;i++){
    const a = parts.slice(0,i).join(" ");
    const b = parts.slice(i).join(" ");
    const score = Math.abs(a.length - b.length) + Math.max(a.length,b.length) * 0.15;
    if(score < bestScore){
      bestScore = score;
      bestSplit = i;
    }
  }

  return [
    parts.slice(0,bestSplit).join(" "),
    parts.slice(bestSplit).join(" ")
  ];
}

function addTextLines(parent, lines, cx, y, width){
  const group = E("text", {x:cx, y:y, "text-anchor":"middle", class:"directorText", "font-size":"38"}, parent);
  lines.slice(0,2).forEach((line,idx)=>{
    const t=E("tspan", {x:cx, dy: idx===0?0:44}, group);
    t.textContent=line;
    const approx=line.length*38*0.49;
    if(approx>width){
      t.setAttribute("textLength", width);
      t.setAttribute("lengthAdjust","spacingAndGlyphs");
    }
  });
}
function renderDirectors(){
  const grid=document.getElementById("directorGrid");
  const cols=20, startX=210, startY=1035, colStep=480, rowStep=555;
  const tileW=405, boxW=240, boxH=360, numberGap=52, nameGap=98;
  const lastCount=directors.length%cols;
  const lastRow=Math.floor((directors.length-1)/cols);
  directors.forEach((name,i)=>{
    const n=i+1; let row=Math.floor(i/cols), col=i%cols;
    if(row===lastRow && lastCount){
      col = i - (lastRow * cols); // last row aligned from the left to avoid overlap with legend
    }
    const x=startX+col*colStep, y=startY+row*rowStep;
    const g=E("g",{},grid);
    E("rect",{x:x+(tileW-boxW)/2,y:y,width:boxW,height:boxH,class:"box"},g);
    addTextLines(g,[String(n)+"."],x+tileW/2,y+boxH+numberGap,330);
    addTextLines(g,labelFor(name),x+tileW/2,y+boxH+nameGap,355);
  });
}
renderDirectors();
function downloadSVG(){
  const svg=document.getElementById("poster"); const clone=svg.cloneNode(true);
  clone.setAttribute("xmlns","http://www.w3.org/2000/svg"); clone.setAttribute("width","100cm"); clone.setAttribute("height","75cm");
  const source='<?xml version="1.0" encoding="UTF-8"?>\n'+new XMLSerializer().serializeToString(clone);
  const blob=new Blob([source],{type:"image/svg+xml;charset=utf-8"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="lumea-prin-regizori-197-lista-noua.svg"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function downloadPNG300(){
  const svg=document.getElementById("poster"); const clone=svg.cloneNode(true);
  clone.setAttribute("xmlns","http://www.w3.org/2000/svg"); clone.setAttribute("width","11811"); clone.setAttribute("height","8858");
  const source=new XMLSerializer().serializeToString(clone); const blob=new Blob([source],{type:"image/svg+xml;charset=utf-8"}); const url=URL.createObjectURL(blob);
  const img=new Image(); img.onload=function(){
    const canvas=document.createElement("canvas"); canvas.width=11811; canvas.height=8858;
    const ctx=canvas.getContext("2d"); ctx.fillStyle="#edf3d4"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width,canvas.height); URL.revokeObjectURL(url);
    canvas.toBlob(function(pngBlob){ const pngUrl=URL.createObjectURL(pngBlob); const a=document.createElement("a"); a.href=pngUrl; a.download="lumea-prin-regizori-197-lista-noua-300dpi.png"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(pngUrl); },"image/png");
  };
  img.onerror=function(){ URL.revokeObjectURL(url); alert("Exportul PNG nu a reușit. Folosește SVG sau PDF pentru print."); };
  img.src=url;
}
</script>
